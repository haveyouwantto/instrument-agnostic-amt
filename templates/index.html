<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HarmonyAI | 多乐器自动识别系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fcfcfc;
            color: #2c3e50;
            font-family: 'Inter', "PingFang SC", sans-serif;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .btn-primary {
            background-color: #1a1a1a;
            transition: all 0.3s ease;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: #404040;
            transform: translateY(-1px);
        }

        .btn-accent {
            background-color: #c5a059;
            transition: all 0.3s ease;
        }

        .btn-accent:hover:not(:disabled) {
            background-color: #b38f4d;
            transform: translateY(-1px);
        }

        /* 禁用状态样式 */
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .instrument-border {
            border-left: 4px solid #c5a059;
        }

        input[type="file"]::file-selector-button {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 1rem;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center p-6">

    <header class="w-full max-w-4xl flex flex-col items-center mb-10 mt-8">
        <div class="flex items-center gap-3 mb-2">
            <span class="text-4xl">🎹</span>
            <h1 class="text-3xl font-light tracking-widest uppercase">HarmonyAI</h1>
        </div>
        <p class="text-gray-500 tracking-widest text-sm">多乐器自动识别与智能转录系统</p>
        <div class="w-16 h-1 bg-gray-200 mt-4"></div>
    </header>

    <main class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <!-- 左侧：控制面板 -->
        <section class="flex flex-col gap-6">
            
            <!-- 1. 本地上传 -->
            <div class="glass-card p-6 instrument-border">
                <h2 class="text-sm font-semibold uppercase tracking-wider mb-4 flex items-center gap-2 text-gray-600">
                    <span>🎻</span> 本地音源上传
                </h2>
                <form id="uploadForm" class="flex flex-col gap-4">
                    <input type="file" id="fileInput" name="file" multiple  
                        class="w-full text-sm text-gray-500 focus:outline-none">
                    <button type="submit" id="uploadBtn" class="btn btn-primary text-white py-3 rounded-lg text-sm font-medium shadow-sm">
                        上传音频文件
                    </button>
                </form>
            </div>

            <!-- 2. YouTube 下载 (已置于转录之前) -->
            <div class="glass-card p-6 instrument-border">
                <h2 class="text-sm font-semibold uppercase tracking-wider mb-4 flex items-center gap-2 text-gray-600">
                    <span>▶️</span> 云端音源获取
                </h2>
                <div class="flex flex-col gap-3">
                    <input type="text" id="ytUrl" placeholder="粘贴 YouTube 视频链接..."  
                        class="w-full p-3 bg-gray-50 text-sm rounded-lg border border-gray-200 focus:ring-1 focus:ring-amber-500 outline-none transition-all">
                    <button id="ytBtn" class="btn w-full border border-gray-300 text-gray-600 py-2.5 rounded-lg text-xs hover:bg-gray-50 transition-colors uppercase tracking-widest font-semibold">
                        从 YouTube 提取音频
                    </button>
                </div>
            </div>

            <!-- 3. 执行转录 -->
            <div class="glass-card p-6 border-t-4 border-t-amber-500">
                <h2 class="text-sm font-semibold uppercase tracking-wider mb-4 flex items-center gap-2 text-gray-600">
                    <span>🎼</span> 核心识别任务
                </h2>
                <button id="transcribeBtn" class="btn btn-accent text-white py-4 rounded-lg text-sm font-bold w-full shadow-lg flex items-center justify-center gap-2">
                    <span>🚀</span> 开始多声部 AI 转录
                </button>
                <p class="text-[10px] text-gray-400 mt-3 text-center italic">支持钢琴、吉他、弦乐等多种乐器自动分离识别</p>
            </div>

        </section>

        <!-- 右侧：任务状态 -->
        <section class="glass-card p-6 flex flex-col h-full">
            <h2 class="text-sm font-semibold uppercase tracking-wider mb-4 flex items-center gap-2 text-gray-600">
                <span>📂</span> 识别队列与导出
            </h2>
            <div class="overflow-auto max-h-[500px]">
                <table class="w-full text-left text-sm">
                    <thead class="text-gray-400 border-b border-gray-100">
                        <tr>
                            <th class="pb-3 font-normal">音源名称</th>
                            <th class="pb-3 font-normal text-center">状态</th>
                            <th class="pb-3 font-normal text-right">结果</th>
                        </tr>
                    </thead>
                    <tbody id="fileList" class="divide-y divide-gray-50">
                        <!-- JS 填充 -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="text-xs text-gray-400 mt-16 mb-8 tracking-widest uppercase">
        &copy; 2025 HarmonyAI Studio / Professional Audio Recognition System
    </footer>

    <script>  
        function initSSE() {  
            const evtSource = new EventSource("/events");  
            const tbody = document.getElementById('fileList');  
  
            const emojiStatus = {  
                pending: '<span class="px-2 py-1 bg-gray-100 text-gray-500 rounded text-[10px]">待处理</span>',  
                processing: '<span class="px-2 py-1 bg-blue-50 text-blue-500 rounded text-[10px] animate-pulse">识别中</span>',  
                transcribed: '<span class="px-2 py-1 bg-green-50 text-green-600 rounded text-[10px]">已完成</span>',  
                error: '<span class="px-2 py-1 bg-red-50 text-red-500 rounded text-[10px]">失败</span>'  
            };  
  
            evtSource.onmessage = function (event) {  
                try {  
                    const data = JSON.parse(event.data);  
                    data.reverse();  
                    tbody.innerHTML = '';  
  
                    for (const f of data) {  
                        const row = document.createElement('tr');  
                        row.className = "hover:bg-gray-50 transition-colors";  
  
                        const downloadLink = f.status === 'transcribed'  
                            ? `<a href="/download/${f.id}" class="text-amber-600 font-bold hover:text-amber-700">MIDI</a>`  
                            : '<span class="text-gray-300">—</span>';  
  
                        row.innerHTML = `  
                            <td class="py-4 pr-2 truncate max-w-[120px]" title="${f.file}">${f.file}</td>  
                            <td class="py-4 text-center">${emojiStatus[f.status] || '❔'}</td>  
                            <td class="py-4 text-right">${downloadLink}</td>  
                        `;  
                        tbody.appendChild(row);  
                    }  
                } catch (err) {  
                    console.error("SSE parse error:", err);  
                }  
            };  
  
            evtSource.onerror = function (err) {  
                console.error("SSE connection lost, retrying...", err);  
            };  
        }  
  
        // 修改上传逻辑：禁用按钮 + 清空 input
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {  
            e.preventDefault();  
            const btn = document.getElementById('uploadBtn');
            const fileInput = document.getElementById('fileInput');
            const originalText = btn.innerText;

            try {
                btn.disabled = true;
                btn.innerText = "正在上传资产...";

                const formData = new FormData();  
                for (const file of fileInput.files) {  
                    formData.append('files', file);  
                }  
                const res = await fetch('/upload', { method: 'POST', body: formData });  
                const msg = await res.json();  
                alert(msg.message);  
                
                if (res.ok) {
                    fileInput.value = ''; // 成功后清空文件选择
                }
            } catch (err) {
                alert("上传失败，请检查网络");
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });  
  
        // 修改转录逻辑：禁用按钮
        document.getElementById('transcribeBtn').addEventListener('click', async () => {  
            const btn = document.getElementById('transcribeBtn');
            const originalText = btn.innerHTML;

            try {
                btn.disabled = true;
                btn.innerText = "正在启动 AI 引擎...";

                const res = await fetch('/transcribe', { method: 'POST' });  
                const msg = await res.json();  
                alert(msg.message);  
            } catch (err) {
                alert("请求失败");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });  
  
        // 修改 YouTube 逻辑：禁用按钮 + 清空 input
        document.getElementById('ytBtn').addEventListener('click', async () => {  
            const btn = document.getElementById('ytBtn');
            const urlInput = document.getElementById('ytUrl');
            const url = urlInput.value.trim();  
            const originalText = btn.innerText;

            if (!url) return alert('请输入有效链接');  

            try {
                btn.disabled = true;
                btn.innerText = "正在提取音频数据...";

                const res = await fetch('/download-youtube?url=' + encodeURIComponent(url));  
                const msg = await res.json();  
                alert(msg.message);  

                if (res.ok) {
                    urlInput.value = ''; // 成功后清空输入框
                }
            } catch (err) {
                alert("远程提取失败");
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });  
  
        document.addEventListener("DOMContentLoaded", initSSE);  
    </script>  
</body>  
</html>
